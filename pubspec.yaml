name: workmanager
description: Flutter Workmanager. This plugin allows you to schedule background work on Android and iOS.
version: 0.9.0+3
publish_to: none
homepage: https://github.com/fluttercommunity/flutter_workmanager
repository: https://github.com/fluttercommunity/flutter_workmanager
issue_tracker: https://github.com/fluttercommunity/flutter_workmanager/issues

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  workmanager_platform_interface:
    git: https://github.com/kumsumit/workmanager_platform_interface.git
  workmanager_android:
    git: https://github.com/kumsumit/workmanager_android.git
  workmanager_apple:
    git: https://github.com/kumsumit/workmanager_apple.git

dev_dependencies:
  test: ^1.31.1
  mockito: ^5.7.0
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: workmanager_android
      ios:
        default_package: workmanager_apple
